# ulogd.conf - Configuración para MVP Protección Infantil (OpenWrt)
# Esta configuración extrae metadatos de red (ZKTCA) sin inspección de paquetes (DPI)

[global]
# Cargar plugins de captura y salida de Syslog
plugin="/usr/lib/ulogd/ulogd_inppkt_NFLOG.so"
plugin="/usr/lib/ulogd/ulogd_inppkt_ULOG.so"
plugin="/usr/lib/ulogd/ulogd_inppkt_UNIXSOCK.so"
plugin="/usr/lib/ulogd/ulogd_inpflow_NFCT.so"
plugin="/usr/lib/ulogd/ulogd_filter_IFINDEX.so"
plugin="/usr/lib/ulogd/ulogd_filter_IP2STR.so"
plugin="/usr/lib/ulogd/ulogd_filter_IP2BIN.so"
plugin="/usr/lib/ulogd/ulogd_filter_PRINTPKT.so"
plugin="/usr/lib/ulogd/ulogd_filter_HWHDR.so"
plugin="/usr/lib/ulogd/ulogd_filter_PRINTFLOW.so"
plugin="/usr/lib/ulogd/ulogd_output_LOGEMU.so"
plugin="/usr/lib/ulogd/ulogd_output_SYSLOG.so"

# Stack de procesamiento para conexiones (Flows)
stack=ct1:NFCT,ip2str1:IP2STR,print1:PRINTFLOW,syslog1:SYSLOG

[ct1]
# CRÍTICO: Deshabilitar hash_enable para registrar NEW y DESTROY separadamente
# Esto permite calcular el IAT y duración exacta de las conexiones en la RPi
hash_enable=0

[syslog1]
# Enviar logs a la Raspberry Pi usando formato IETF
# facility de sysklogd para local0
facility=16
level=6
# Formato que será parseado por la Raspberry Pi
format="ZKTCA_METADATA: src_ip=%(src_ip)s dst_ip=%(dst_ip)s src_port=%(src_port)s dst_port=%(dst_port)s protocol=%(protocol)s packets=%(packets)s bytes=%(bytes)s event=%(event)s"

# En un entorno de producción, ulogd2 enviará a syslog-ng local,
# el cual se encargará del forwarding con TLS a la IP de la RPi.
# Alternativamente, si se compila con soporte de red remoto,
# configurar aquí la IP de la RPi.
